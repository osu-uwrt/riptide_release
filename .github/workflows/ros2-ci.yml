name: ROS 2 Full Stack CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the release repo + all 12 submodules recursively
      # -----------------------------------------------------------------------
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -----------------------------------------------------------------------
      # 2. Install ROS 2 Humble
      # -----------------------------------------------------------------------
      - name: Setup ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      # -----------------------------------------------------------------------
      # 3. System dependencies not covered by rosdep
      #    (hardware drivers, serial libs, Qt5 for RViz plugins, etc.)
      # -----------------------------------------------------------------------
      - name: Install extra system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libusb-1.0-0-dev \
            libserial-dev \
            python3-vcstool \
            python3-colcon-common-extensions \
            libqt5widgets5 \
            qtbase5-dev \
            qtbase5-dev-tools

      # -----------------------------------------------------------------------
      # 4. Install all ROS dep from every package in src/
      # -----------------------------------------------------------------------
      - name: Install ROS dependencies via rosdep
        run: |
          sudo rosdep init || true
          rosdep update
          rosdep install \
            --from-paths src \
            --ignore-src \
            --rosdistro humble \
            -r -y

      # -----------------------------------------------------------------------
      # 5. Build the full workspace
      #    - tensor_detector  skipped: requires CUDA/GPU (not on GH runners)
      # -----------------------------------------------------------------------
      - name: Build workspace with colcon
        run: |
          source /opt/ros/humble/setup.bash
          colcon build \
            --packages-skip tensor_detector \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
            --event-handlers console_cohesion+

      # -----------------------------------------------------------------------
      # 6. Upload build logs on failure for easy diagnosis
      # -----------------------------------------------------------------------
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            log/
            build/*/stderr.log
          retention-days: 7
